<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>講話メール送付ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1ec;
  --surface: #faf8f4;
  --surface2: #eee9e0;
  --border: #d8d0c4;
  --ink: #1e1a15;
  --ink2: #5a5347;
  --ink3: #9a9088;
  --accent: #2d5a3d;
  --accent-light: #e8f0eb;
  --accent2: #8b4513;
  --red: #c0392b;
  --red-pale: #fdf0ee;
  --yellow: #d4870a;
  --yellow-pale: #fdf6e8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
}

/* HEADER */
header {
  background: var(--ink);
  color: #f4f1ec;
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.05em; }
header .sub { font-size: 11px; color: #9a9088; font-family: 'DM Mono', monospace; }

/* LAYOUT */
.container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--ink3); text-transform: uppercase;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* FORM */
label { display: block; font-size: 12px; color: var(--ink2); margin-bottom: 5px; font-weight: 500; }
input[type=text], textarea {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border); border-radius: 5px;
  background: var(--bg); color: var(--ink);
  font-family: inherit; font-size: 13px;
  outline: none; transition: border-color .15s;
}
input[type=text]:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 70px; }
.form-row { margin-bottom: 12px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 5px; border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 500;
  transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #234a30; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary { background: var(--surface2); color: var(--ink); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.btn-outline:hover { background: var(--accent-light); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #a93226; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

/* COMPANY LIST */
.company-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px;
  margin-top: 10px;
}
.company-chip {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px;
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  transition: all .15s;
}
.company-chip:hover { border-color: var(--accent); }
.company-chip.selected { background: var(--accent-light); border-color: var(--accent); }
.company-chip .name { font-size: 13px; font-weight: 500; flex: 1; }
.company-chip .email-tag {
  font-size: 10px; color: var(--ink3); font-family: 'DM Mono', monospace;
  max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.company-chip .no-email { font-size: 10px; color: var(--red); }
.chip-check { width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.company-chip.selected .chip-check { background: var(--accent); border-color: var(--accent); }
.chip-check svg { display: none; }
.company-chip.selected .chip-check svg { display: block; }

/* MAIL PREVIEW */
.mail-list { display: flex; flex-direction: column; gap: 12px; }
.mail-item {
  border: 1px solid var(--border); border-radius: 7px;
  background: var(--surface); overflow: hidden;
}
.mail-header {
  padding: 10px 14px; background: var(--surface2);
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.mail-header .company-name { font-weight: 600; font-size: 13px; flex: 1; }
.mail-header .to-addr { font-size: 11px; color: var(--ink3); font-family: 'DM Mono', monospace; }
.mail-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.mail-status.generating { background: var(--yellow-pale); color: var(--yellow); }
.mail-status.done { background: var(--accent-light); color: var(--accent); }
.mail-status.saved { background: #e8f4fd; color: #2980b9; }
.mail-status.error { background: var(--red-pale); color: var(--red); }
.mail-body { padding: 14px; border-top: 1px solid var(--border); display: none; }
.mail-body.open { display: block; }
.mail-subject { font-size: 12px; color: var(--ink3); margin-bottom: 8px; }
.mail-subject span { font-weight: 600; color: var(--ink); }
.mail-text {
  white-space: pre-wrap; font-size: 13px; line-height: 1.75;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; padding: 12px; max-height: 280px; overflow-y: auto;
}
.mail-actions { margin-top: 10px; display: flex; gap: 8px; }

/* STATUS BAR */
.status-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; font-size: 13px;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.idle { background: var(--ink3); }
.status-dot.loading { background: var(--yellow); animation: pulse .8s ease-in-out infinite alternate; }
.status-dot.ok { background: var(--accent); }
.status-dot.error { background: var(--red); }
@keyframes pulse { from { opacity: .4; } to { opacity: 1; } }

/* PROGRESS */
.progress-wrap { margin: 10px 0; }
.progress-bar { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); transition: width .3s; border-radius: 4px; }
.progress-label { font-size: 11px; color: var(--ink3); margin-top: 5px; font-family: 'DM Mono', monospace; }

/* TOAST */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--ink); color: #f4f1ec;
  padding: 10px 18px; border-radius: 6px;
  font-size: 13px; opacity: 0; pointer-events: none;
  transition: opacity .25s; z-index: 999;
}
.toast.show { opacity: 1; }

/* SPINNER */
.spinner {
  width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state { text-align: center; padding: 30px; color: var(--ink3); font-size: 13px; }
.badge { background: var(--accent); color: #fff; font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 700; }
</style>
</head>
<body>

<header>
  <div>
    <h1>📢 講話メール送付ツール</h1>
  </div>
  <div class="sub" id="date-label"></div>
</header>

<div class="container">

  <!-- STATUS -->
  <div class="status-bar">
    <div class="status-dot idle" id="status-dot"></div>
    <span id="status-text">準備完了</span>
  </div>

  <!-- STEP 1: 講話情報 -->
  <div class="card">
    <div class="card-title">① 今月の講話情報</div>
    <div class="form-grid">
      <div class="form-row">
        <label>講話テーマ</label>
        <input type="text" id="theme" placeholder="例：熱中症予防、メンタルヘルス">
      </div>
      <div class="form-row">
        <label>メール件名</label>
        <input type="text" id="subject" placeholder="例：【健康講話】6月 熱中症予防について">
      </div>
    </div>
    <div class="form-row">
      <label>講話のポイント（2〜3点）</label>
      <textarea id="points" placeholder="例：・熱中症の初期症状の見分け方&#10;・職場でできる予防策&#10;・緊急時の対応手順"></textarea>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>添付ファイル名（任意）</label>
        <input type="text" id="attachment" placeholder="例：202506_熱中症予防.pptx">
      </div>
      <div class="form-row">
        <label>署名（送信者名）</label>
        <input type="text" id="signature" placeholder="産業医 氏名" value="">
      </div>
    </div>
  </div>

  <!-- STEP 2: 送付先 -->
  <div class="card">
    <div class="card-title">② 送付先（Notionから自動取得）</div>
    <div class="btn-row" style="margin-top:0; margin-bottom: 14px;">
      <button class="btn btn-secondary" onclick="loadCompanies()">
        <span>📋</span> Notionから読み込む
      </button>
      <button class="btn btn-outline" onclick="toggleAll()" id="toggle-btn" style="display:none">すべて選択</button>
    </div>
    <div id="progress-load" style="display:none" class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="load-fill" style="width:0%"></div></div>
      <div class="progress-label" id="load-label">読み込み中...</div>
    </div>
    <div id="company-list"><div class="empty-state">「Notionから読み込む」を押してください</div></div>
  </div>

  <!-- STEP 3: 生成・送付 -->
  <div class="card">
    <div class="card-title">③ メール生成 → Gmail下書き保存</div>
    <div class="btn-row" style="margin-top:0;">
      <button class="btn btn-primary" id="gen-btn" onclick="generateAll()">
        ✉️ 本文を生成する
      </button>
      <button class="btn btn-danger" id="draft-btn" onclick="saveAllDrafts()" style="display:none">
        📨 全件 Gmail下書き保存
      </button>
    </div>
    <div id="progress-gen" style="display:none" class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="gen-fill" style="width:0%"></div></div>
      <div class="progress-label" id="gen-label">生成中...</div>
    </div>
    <div id="mail-list" style="margin-top:14px"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let companies = [];   // { name, email, industry, issue, memo }
let mails = {};       // { companyName: { subject, body, status } }

// ===== INIT =====
document.getElementById('date-label').textContent =
  new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });

// ===== LOAD COMPANIES =====
async function loadCompanies() {
  setStatus('loading', 'Notionから読み込み中...');
  document.getElementById('progress-load').style.display = 'block';
  document.getElementById('load-fill').style.width = '30%';
  document.getElementById('load-label').textContent = '📢 講話送付チェック済み企業を検索中...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `NotionのCRMデータベース（訪問先マスター）から「📢 講話送付」がチェック済み（true）の企業一覧を取得してください。
database_id: d362239d2b374cdc98c832e935719642

各企業について以下を取得:
- 企業名
- 担当者連絡先（メールアドレス）
- 担当者名
- 職種
- 🔴 課題
- メモ

必ず以下のJSON形式のみで返答してください（他のテキスト・説明文は一切不要）:
{"companies": [{"name":"企業名","email":"メール","contact":"担当者名","industry":"職種","issue":"課題","memo":"メモ"}]}`,
        messages: [{ role: 'user', content: '講話送付チェック済み企業一覧をJSONで返してください' }],
        mcp_servers: [{ type: 'url', url: 'https://mcp.notion.com/mcp', name: 'notion' }]
      })
    });

    document.getElementById('load-fill').style.width = '80%';

    const data = await res.json();
    const textBlocks = data.content.filter(b => b.type === 'text').map(b => b.text).join('');

    let parsed;
    try {
      const clean = textBlocks.replace(/```json|```/g, '').trim();
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      parsed = JSON.parse(jsonMatch ? jsonMatch[0] : clean);
    } catch(e) {
      throw new Error('Notionデータの解析に失敗しました: ' + textBlocks.slice(0, 200));
    }

    companies = (parsed.companies || []).map(c => ({ ...c, selected: true }));

    document.getElementById('load-fill').style.width = '100%';
    document.getElementById('load-label').textContent = `✅ ${companies.length}社取得完了`;

    renderCompanyList();
    setStatus('ok', `${companies.length}社読み込み完了（📢 講話送付チェック済み）`);
    document.getElementById('toggle-btn').style.display = 'inline-flex';

    setTimeout(() => { document.getElementById('progress-load').style.display = 'none'; }, 1000);

  } catch(e) {
    setStatus('error', 'エラー: ' + e.message);
    document.getElementById('load-label').textContent = '❌ ' + e.message;
    console.error(e);
  }
}

function renderCompanyList() {
  const el = document.getElementById('company-list');
  if (!companies.length) {
    el.innerHTML = '<div class="empty-state">📢 講話送付チェック済みの企業が見つかりませんでした</div>';
    return;
  }
  el.innerHTML = `
    <div style="font-size:12px;color:var(--ink3);margin-bottom:10px;">
      ${companies.filter(c=>c.selected).length}社選択中 / ${companies.length}社
    </div>
    <div class="company-grid">
      ${companies.map((c, i) => `
        <div class="company-chip ${c.selected ? 'selected' : ''}" onclick="toggleCompany(${i})">
          <div class="chip-check">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4L4 7L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div style="flex:1;min-width:0">
            <div class="name">${c.name}</div>
            ${c.email
              ? `<div class="email-tag">${c.email}</div>`
              : `<div class="no-email">⚠ メール未登録</div>`}
          </div>
        </div>
      `).join('')}
    </div>`;
}

function toggleCompany(i) {
  companies[i].selected = !companies[i].selected;
  renderCompanyList();
}

function toggleAll() {
  const allSelected = companies.every(c => c.selected);
  companies.forEach(c => c.selected = !allSelected);
  document.getElementById('toggle-btn').textContent = allSelected ? 'すべて選択' : 'すべて解除';
  renderCompanyList();
}

// ===== GENERATE =====
async function generateAll() {
  const theme = document.getElementById('theme').value.trim();
  const points = document.getElementById('points').value.trim();
  if (!theme) { showToast('講話テーマを入力してください'); return; }

  const targets = companies.filter(c => c.selected && c.email);
  if (!targets.length) { showToast('送付先（メールアドレスあり）を選択してください'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 生成中...';

  document.getElementById('progress-gen').style.display = 'block';
  document.getElementById('mail-list').innerHTML = '<div class="mail-list"></div>';
  mails = {};

  for (let i = 0; i < targets.length; i++) {
    const c = targets[i];
    const pct = Math.round((i / targets.length) * 100);
    document.getElementById('gen-fill').style.width = pct + '%';
    document.getElementById('gen-label').textContent = `(${i+1}/${targets.length}) ${c.name} を生成中...`;
    setStatus('loading', `${c.name} のメールを生成中...`);

    mails[c.name] = { subject: '', body: '', status: 'generating', to: c.email, contact: c.contact };
    renderMailList(targets);

    try {
      const body = await generateOneMail(c, theme, points);
      mails[c.name].subject = document.getElementById('subject').value || `【健康講話】${theme}`;
      mails[c.name].body = body;
      mails[c.name].status = 'done';
    } catch(e) {
      mails[c.name].status = 'error';
      mails[c.name].body = 'エラー: ' + e.message;
    }
    renderMailList(targets);
  }

  document.getElementById('gen-fill').style.width = '100%';
  document.getElementById('gen-label').textContent = `✅ ${targets.length}件生成完了`;
  setStatus('ok', `${targets.length}件のメールを生成しました`);

  btn.disabled = false;
  btn.innerHTML = '✉️ 本文を生成する';
  document.getElementById('draft-btn').style.display = 'inline-flex';
}

async function generateOneMail(company, theme, points) {
  const subject = document.getElementById('subject').value || `【健康講話】${theme}`;
  const attachment = document.getElementById('attachment').value.trim();
  const signature = document.getElementById('signature').value.trim() || '産業医';
  const contact = company.contact ? `${company.contact}様` : 'ご担当者様';

  const prompt = `産業医として、以下の情報をもとに会社への月次健康講話送付メールを作成してください。

【送付先】${company.name}　${contact}
【業種・職種】${company.industry || '不明'}
【会社の課題・特徴】${company.issue || '特になし'}
【その他メモ】${company.memo || 'なし'}
【講話テーマ】${theme}
【講話のポイント】
${points || '（なし）'}
【添付ファイル】${attachment || 'なし'}
【署名】${signature}

条件：
・丁寧で簡潔な文体（産業医らしい表現）
・会社の業種・課題があれば本文に自然に1行程度反映する
・添付ファイルがある場合はその旨を記載、ない場合は言及不要
・字数は200〜300字程度
・件名は含めず本文のみ出力`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('');
}

// ===== RENDER MAILS =====
function renderMailList(targets) {
  const el = document.getElementById('mail-list');
  el.innerHTML = `<div class="mail-list">${targets.map(c => {
    const m = mails[c.name] || {};
    const statusLabel = { generating: '生成中', done: '完了', saved: '保存済', error: 'エラー' }[m.status] || '';
    const isOpen = m.status === 'done' || m.status === 'error';
    return `
      <div class="mail-item">
        <div class="mail-header" onclick="toggleMail('${c.name}')">
          <div class="company-name">${c.name}</div>
          <div class="to-addr">${c.email || ''}</div>
          ${m.status ? `<span class="mail-status ${m.status}">${statusLabel}</span>` : ''}
        </div>
        <div class="mail-body ${isOpen ? 'open' : ''}" id="body-${c.name.replace(/[^\w]/g,'_')}">
          <div class="mail-subject">件名: <span>${mails[c.name]?.subject || ''}</span></div>
          <div class="mail-text">${(m.body || '').replace(/</g,'&lt;')}</div>
          ${m.status === 'done' ? `
          <div class="mail-actions">
            <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="copyMail('${c.name}')">コピー</button>
            <button class="btn btn-outline" style="font-size:12px;padding:6px 12px" onclick="saveSingleDraft('${c.name}')">この1件を下書き保存</button>
          </div>` : ''}
        </div>
      </div>`;
  }).join('')}</div>`;
}

function toggleMail(name) {
  const id = 'body-' + name.replace(/[^\w]/g,'_');
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function copyMail(name) {
  const m = mails[name];
  if (!m) return;
  navigator.clipboard.writeText(`件名: ${m.subject}\n\n${m.body}`).then(() => showToast('コピーしました ✓'));
}

// ===== GMAIL DRAFT =====
async function saveSingleDraft(name) {
  const m = mails[name];
  if (!m) return;
  await sendToGmail([{ name, to: m.to, subject: m.subject, body: m.body }]);
  mails[name].status = 'saved';
  const targets = companies.filter(c => c.selected && c.email);
  renderMailList(targets);
}

async function saveAllDrafts() {
  const items = Object.entries(mails)
    .filter(([, m]) => m.status === 'done')
    .map(([name, m]) => ({ name, to: m.to, subject: m.subject, body: m.body }));
  if (!items.length) { showToast('生成済みのメールがありません'); return; }

  const btn = document.getElementById('draft-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 保存中...';
  setStatus('loading', 'Gmailに下書き保存中...');

  await sendToGmail(items);

  items.forEach(({ name }) => { if (mails[name]) mails[name].status = 'saved'; });
  const targets = companies.filter(c => c.selected && c.email);
  renderMailList(targets);

  btn.disabled = false;
  btn.innerHTML = '📨 全件 Gmail下書き保存';
  setStatus('ok', `${items.length}件をGmailに保存しました`);
}

async function sendToGmail(items) {
  const prompt = `以下の${items.length}件のメールをGmailの下書きとして保存してください。

${items.map((e, i) => `【メール${i+1}】
宛先: ${e.to}
件名: ${e.subject}
本文:
${e.body}`).join('\n---\n')}

各メールを個別にGmailの下書きとして保存してください。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }],
        mcp_servers: [{ type: 'url', url: 'https://gmailmcp.googleapis.com/mcp/v1', name: 'gmail' }]
      })
    });
    const data = await res.json();
    showToast(`${items.length}件の下書きをGmailに保存しました ✓`);
    console.log('Gmail response:', data);
  } catch(e) {
    showToast('Gmail保存エラー: ' + e.message);
    setStatus('error', 'Gmail保存エラー');
  }
}

// ===== UTILS =====
function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
